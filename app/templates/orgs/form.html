{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if org else 'Новая организация' }} — СОУТ{% endblock %}
{% block content %}
<div class="card" style="max-width:600px">
  <div class="breadcrumb"><a href="/orgs/">Организации</a> / {{ 'Редактировать' if org else 'Новая' }}</div>
  <h2>{{ 'Редактировать организацию' if org else 'Новая организация' }}</h2>
  <form method="post" action="{{ '/orgs/' ~ org.id ~ '/edit' if org else '/orgs/new' }}">
    <label>Наименование *</label>
    <input type="text" name="name" required value="{{ org.name if org else '' }}">
    <label>ИНН</label>
    <input type="text" name="inn" value="{{ org.inn if org else '' }}" maxlength="12">
    <label>Адрес</label>
    <textarea name="address" rows="2">{{ org.address if org else '' }}</textarea>
    <br>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ '/orgs/' ~ org.id if org else '/orgs/' }}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
